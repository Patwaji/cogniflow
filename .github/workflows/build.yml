name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # needed to attach bundles to a release on tag

env:
  # Better cache hit-rate on CI; incremental compilation only helps local rebuilds.
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Two native macOS builds → a .dmg for Apple Silicon and one for Intel.
          - runner: macos-14
            label: macos-arm64
            bundles: dmg
          - runner: macos-13
            label: macos-x64
            bundles: dmg
          # ubuntu-22.04 has the webkit2gtk-4.1 + AppImage/FUSE combo that
          # actually bundles cleanly (24.04 breaks AppImage). Produces .deb + .AppImage.
          - runner: ubuntu-22.04
            label: linux-x64
            bundles: deb,appimage
          - runner: windows-latest
            label: windows-x64
            bundles: nsis
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # Caches the Rust build so warm runs skip most of the (slow) compile.
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.label }}

      - name: Install Linux system deps
        if: startsWith(matrix.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libfuse2

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      # beforeBuildCommand (bun run build) builds the frontend first, so a broken
      # web build fails fast before the long Rust compile.
      - name: Build Tauri app
        run: bun tauri build --bundles ${{ matrix.bundles }}

      # Upload even if a later matrix leg fails, and even on partial success,
      # so a good .deb isn't lost because .AppImage hiccuped.
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cogniflow-${{ matrix.label }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      # On a version tag (v*), publish a GitHub Release with every platform's
      # installer attached. Each matrix leg appends its own files to the release.
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          fail_on_unmatched_files: false
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/nsis/*.exe
